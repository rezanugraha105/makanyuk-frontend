<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="favicon.png">

    <title>MakanYuk</title>
    <link
       rel="stylesheet"
       href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
       integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
       crossorigin="anonymous"
       referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  </head>
  <body class="flex flex-col min-h-screen bg-white text-gray-800 font-sans">

  <!-- HEADER -->
  <header class="bg-orange-100 sticky top-0 z-50 py-5 shadow-md">
    <div class="container mx-auto flex items-center justify-between px-4">
      <a id="logo-link" href="#/home" class="text-2xl font-bold text-orange-700">MakanYuk</a>

      <!-- Navigation Drawer (Mobile) -->
      <nav id="navigation-drawer"
           class="absolute top-full right-4 mt-2 bg-orange-100 rounded-lg shadow-lg w-48 flex-col space-y-2 p-4 z-50 hidden md:hidden">
        <ul id="nav-list" class="space-y-2"></ul>
      </nav>

      <!-- Drawer Button (Mobile only) -->
      <button id="drawer-button"
              class="md:hidden text-3xl font-bold p-2 rounded hover:bg-orange-200 transition duration-200">
        ☰
      </button>

      <!-- Desktop Nav -->
      <ul id="nav-desktop-list" class="hidden md:flex items-center space-x-4"></ul>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="flex-grow z-0"></main>

  <!-- FOOTER -->
  <footer class="bg-orange-100">
    <div class="container mx-auto py-8 px-4 text-center text-sm text-gray-600">
      <hr class="mb-4 border-orange-200">
      <div class="flex justify-center items-center mb-2">
        <span class="font-semibold text-orange-700 text-base">MakanYuk App</span>
      </div>
      <p>&copy; 2025 Reza Nugraha. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>
</body>
</html>
